name: RFC Placeholder Check

on:
  pull_request:
    paths:
      - 'rfc/RFC-*.md'
      - '.github/scripts/check_rfc_placeholder.py'
  push:
    paths:
      - 'rfc/RFC-*.md'
      - '.github/scripts/check_rfc_placeholder.py'

jobs:
  rfc-placeholder-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run RFC placeholder check
        run: python .github/scripts/check_rfc_placeholder.py
