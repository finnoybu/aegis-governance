name: RFC Template Compliance

on:
  pull_request:
    paths:
      - 'rfc/**'
  push:
    paths:
      - 'rfc/**'

jobs:
  rfc-template-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Run RFC template check
        run: |
          python .github/scripts/check_rfc_template.py
